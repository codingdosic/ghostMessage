spring:
  application:
    name: ghostMessage # 프로젝트 이름

  datasource: # DB 접속 정보
    url: jdbc:postgresql://db:5432/ghost_db
    username: ghost_user # 본인의 DB 계정 ID
    password: 1 # 본인의 DB 계정 PW
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: redis
      port: 6379

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: validate # Flyway 도입 후에는 변경 내역을 validate만 수행
    defer-datasource-initialization: true
    show-sql: true # 실행되는 SQL문을 콘솔창에 보여줌
    properties:
      hibernate:
        format_sql: true # SQL문을 보기 좋게 정렬함
        dialect: org.hibernate.dialect.PostgreSQLDialect # DB에 맞는 언어 설정

  sql:
    init:
      mode: never # Flyway 사용 시 data.sql은 비활성화

  flyway:
    enabled: true
    baseline-on-migrate: true # 기존 DB가 있는 경우 필수
    baseline-version: 0
    locations: classpath:db/migration

  management:
    endpoints:
      web:
        exposure:
          include: health, info, prometheus
    endpoint:
      prometheus:
        enabled: true
      health:
        show-details: always
