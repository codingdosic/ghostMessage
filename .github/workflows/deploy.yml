name: GhostMessage CI/CD (GHCR Standard)

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'ghostMessage_server_r/**' # 백엔드 코드가 바뀔 때만 실행

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ghost-message-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 # 2026 표준 Java 버전
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        working-directory: ./ghostMessage_server_r
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ghostMessage_server_r
          file: ./ghostMessage_server_r/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app/ghostMessage_server
            # 1. 최신 이미지 가져오기
            docker-compose pull app
            # 2. 컨테이너 재실행 (데이터 보존)
            docker-compose up -d app
            # 3. 오래된 이미지 정리
            docker image prune -f
