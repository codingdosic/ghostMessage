name: GhostMessage CI/CD (GHCR Standard)

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'ghostMessage_server/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ghost-message-server
  # 2026년 6월 Node.js 24 강제 대응 설정
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        working-directory: ./ghostMessage_server
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ghostMessage_server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e # 에러 발생 시 즉시 중단하여 원인 파악 용이
            cd ~/app/ghostMessage_server
            
            # 1. 이미지 주소 확인 (디버깅용)
            echo "Pulling latest image for codingdosic/ghost-message-server..."
            
            # 2. 최신 이미지 가져오기 (실패 시 여기서 멈춤)
            docker-compose pull app
            
            # 3. 컨테이너 재실행
            docker-compose up -d app
            
            # 4. 오래된 이미지 정리
            docker image prune -f
            
            echo "Deployment successful!"
