version: '3.8'

services:
  # 1. Spring Boot API Server
  app:
    build: ./ghostMessage
    container_name: ghost-app

    ports:
      - "8080:8080"

    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ghost_db
      - SPRING_DATASOURCE_USERNAME=ghost_user
      - SPRING_DATASOURCE_PASSWORD=password

      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379

      # JVM Memory Limit
      - JAVA_OPTS=-Xms256m -Xmx384m

    depends_on:
      - db
      - redis

    restart: always

    mem_limit: 512m

  # 2. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: ghost-db

    environment:
      - POSTGRES_DB=ghost_db
      - POSTGRES_USER=ghost_user
      - POSTGRES_PASSWORD=password

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    restart: always

    mem_limit: 256m

  # 3. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ghost-redis

    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru

    volumes:
      - ./data/redis:/data

    ports:
      - "6379:6379"

    restart: always

    mem_limit: 128m